services:
  - type: web
    name: pookal-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_NAME
        value: Pookal
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:ZXJJpPKV7WIn9ugX7wfTE+BCBPZWGurAcVjWyQfROuo=
      - key: APP_URL
        value: https://pookal.onrender.com

      # ── Platform database → existing Render PostgreSQL ────────────────────
      # PLATFORM_DATABASE_URL must be set manually in the Render dashboard:
      #   Dashboard → pookal-backend → Environment → PLATFORM_DATABASE_URL
      #   Value: copy "Internal Database URL" from your PostgreSQL service
      #          (dpg-d7mcihlckfvc73ed25hg-a)
      - key: PLATFORM_DB_DRIVER
        value: pgsql
      - key: PLATFORM_DATABASE_URL
        sync: false
      - key: PLATFORM_DB_SSLMODE
        value: require

      # ── Tenant databases → SQLite inside container ────────────────────────
      - key: TENANT_DB_DRIVER
        value: sqlite

      # ── Frontend / CORS ───────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://pookal-frontend.vercel.app
      - key: FRONTEND_URLS
        value: https://pookal-frontend.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: pookal-frontend.vercel.app

      # ── Cache / Session / Queue ───────────────────────────────────────────
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
